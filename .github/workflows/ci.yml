name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:v0.7.4-pg16
        env:
          POSTGRES_USER: jobboard
          POSTGRES_PASSWORD: jobboard
          POSTGRES_DB: jobboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jobboard:jobboard@localhost:5432/jobboard

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run migrations
        run: |
          for f in migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Seed data
        run: |
          if [ -f scripts/seed.py ]; then
            uv run python scripts/seed.py
          fi

      - name: Test
        run: uv run pytest tests/ -v
