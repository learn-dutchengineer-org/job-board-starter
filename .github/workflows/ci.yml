name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jobboard
          POSTGRES_PASSWORD: jobboard
          POSTGRES_DB: jobboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://jobboard:jobboard@localhost:5432/jobboard

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run migrations
        run: psql "$DATABASE_URL" -f migrations/001_create_tables.sql

      - name: Test
        run: uv run pytest tests/ -v
